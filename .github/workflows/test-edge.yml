name: Run Edge Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # This silences the warning

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Recommended stable version

      - name: Install dependencies
        working-directory: ./edge
        run: |
          python -m pip install --upgrade pip
          # Install core requirements and test tools
          pip install -e .[dev]

      - name: Run Tests
        working-directory: ./edge
        run: |
          pytest tests/ --junit-xml=test-results.xml -v 
